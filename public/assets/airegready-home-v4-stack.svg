<svg width="640" height="520" viewBox="0 0 640 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="v4-stack-title v4-stack-desc">
  <title id="v4-stack-title">AI Governance Starter Stack preview</title>
  <desc id="v4-stack-desc">A premium product mockup showing a stack of governance documents, a checklist preview, and a quality seal.</desc>

  <defs>
    <linearGradient id="v4s-bg" x1="0" y1="0" x2="640" y2="520" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F4F8FC"/>
      <stop offset="1" stop-color="#E7EFF9"/>
    </linearGradient>
    <linearGradient id="v4s-doc1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F4F8FC"/>
    </linearGradient>
    <linearGradient id="v4s-navy" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#11305A"/>
      <stop offset="1" stop-color="#0A1F3A"/>
    </linearGradient>
    <filter id="v4s-shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#0A1F3A" flood-opacity="0.16"/>
    </filter>
  </defs>

  <rect width="640" height="520" rx="28" fill="url(#v4s-bg)"/>

  <!-- Decorative background circles -->
  <circle cx="80" cy="80" r="120" fill="#1E5BA8" opacity="0.06"/>
  <circle cx="560" cy="460" r="160" fill="#0FB4A6" opacity="0.08"/>

  <!-- Document 3 (back) -->
  <g filter="url(#v4s-shadow)" transform="rotate(-6 240 280)">
    <rect x="80" y="120" width="320" height="380" rx="14" fill="url(#v4s-doc1)" stroke="#D6E1EE"/>
    <rect x="100" y="148" width="180" height="10" rx="5" fill="#0A1F3A" opacity="0.85"/>
    <rect x="100" y="170" width="120" height="6" rx="3" fill="#5B7088" opacity="0.55"/>
    <g transform="translate(100, 200)">
      <rect x="0" y="0" width="280" height="6" rx="3" fill="#E5ECF4"/>
      <rect x="0" y="14" width="240" height="6" rx="3" fill="#E5ECF4"/>
      <rect x="0" y="28" width="260" height="6" rx="3" fill="#E5ECF4"/>
      <rect x="0" y="56" width="200" height="6" rx="3" fill="#E5ECF4"/>
      <rect x="0" y="70" width="220" height="6" rx="3" fill="#E5ECF4"/>
      <rect x="0" y="98" width="240" height="6" rx="3" fill="#E5ECF4"/>
      <rect x="0" y="112" width="180" height="6" rx="3" fill="#E5ECF4"/>
    </g>
  </g>

  <!-- Document 2 (middle) -->
  <g filter="url(#v4s-shadow)" transform="rotate(2 320 280)">
    <rect x="160" y="100" width="320" height="380" rx="14" fill="#FFFFFF" stroke="#D6E1EE"/>
    <rect x="180" y="128" width="220" height="10" rx="5" fill="#1E5BA8"/>
    <rect x="180" y="150" width="120" height="6" rx="3" fill="#5B7088" opacity="0.6"/>

    <!-- Checklist -->
    <g transform="translate(180, 188)">
      <g>
        <rect x="0" y="0" width="18" height="18" rx="4" fill="#0FB4A6"/>
        <path d="M4 9 L8 13 L14 6" stroke="#FFFFFF" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="28" y="14" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#0A1F3A">Acceptable Use Policy</text>
      </g>
      <g transform="translate(0, 36)">
        <rect x="0" y="0" width="18" height="18" rx="4" fill="#0FB4A6"/>
        <path d="M4 9 L8 13 L14 6" stroke="#FFFFFF" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="28" y="14" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#0A1F3A">AI System Inventory</text>
      </g>
      <g transform="translate(0, 72)">
        <rect x="0" y="0" width="18" height="18" rx="4" fill="#0FB4A6"/>
        <path d="M4 9 L8 13 L14 6" stroke="#FFFFFF" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="28" y="14" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#0A1F3A">Risk Intake Worksheet</text>
      </g>
      <g transform="translate(0, 108)">
        <rect x="0" y="0" width="18" height="18" rx="4" fill="#0FB4A6"/>
        <path d="M4 9 L8 13 L14 6" stroke="#FFFFFF" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="28" y="14" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#0A1F3A">Vendor Review Checklist</text>
      </g>
      <g transform="translate(0, 144)">
        <rect x="0" y="0" width="18" height="18" rx="4" fill="#FFFFFF" stroke="#C8D6E6" stroke-width="2"/>
        <text x="28" y="14" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#5B7088">Update Tracker (draft)</text>
      </g>
      <g transform="translate(0, 180)">
        <rect x="0" y="0" width="18" height="18" rx="4" fill="#FFFFFF" stroke="#C8D6E6" stroke-width="2"/>
        <text x="28" y="14" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#5B7088">Quarterly review agenda</text>
      </g>
    </g>
  </g>

  <!-- Quality seal -->
  <g transform="translate(450, 50)">
    <circle cx="60" cy="60" r="58" fill="url(#v4s-navy)" filter="url(#v4s-shadow)"/>
    <circle cx="60" cy="60" r="48" fill="none" stroke="#0FB4A6" stroke-width="2" stroke-dasharray="3 4"/>
    <text x="60" y="50" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" font-weight="800" fill="#9BE5DD" letter-spacing="2">PLAIN</text>
    <text x="60" y="65" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" font-weight="800" fill="#9BE5DD" letter-spacing="2">ENGLISH</text>
    <text x="60" y="86" text-anchor="middle" font-family="Georgia, serif" font-size="13" font-weight="700" fill="#FFFFFF">EDITABLE</text>
  </g>
</svg>
