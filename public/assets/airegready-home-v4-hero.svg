<svg width="900" height="680" viewBox="0 0 900 680" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="v4-hero-title v4-hero-desc">
  <title id="v4-hero-title">AIRegReady governance workspace</title>
  <desc id="v4-hero-desc">A composed product mockup showing an AI readiness scorecard, a kit document index, a regulation tracker timeline, and vendor review status chips.</desc>

  <defs>
    <linearGradient id="v4bg" x1="0" y1="0" x2="900" y2="680" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#EAF1FA"/>
      <stop offset="1" stop-color="#F4F7FB"/>
    </linearGradient>
    <linearGradient id="v4navy" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#11305A"/>
      <stop offset="1" stop-color="#0A1F3A"/>
    </linearGradient>
    <linearGradient id="v4teal" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0FB4A6"/>
      <stop offset="1" stop-color="#1AC3B5"/>
    </linearGradient>
    <linearGradient id="v4blueBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1E5BA8"/>
      <stop offset="1" stop-color="#3A86E0"/>
    </linearGradient>
    <filter id="v4shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="22" flood-color="#0A1F3A" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="900" height="680" rx="32" fill="url(#v4bg)"/>

  <!-- Decorative grid -->
  <g opacity="0.4" stroke="#C8D6E6" stroke-width="1">
    <path d="M0 120 H900"/>
    <path d="M0 240 H900"/>
    <path d="M0 360 H900"/>
    <path d="M0 480 H900"/>
    <path d="M0 600 H900"/>
    <path d="M150 0 V680"/>
    <path d="M300 0 V680"/>
    <path d="M450 0 V680"/>
    <path d="M600 0 V680"/>
    <path d="M750 0 V680"/>
  </g>

  <!-- Decorative orbs -->
  <circle cx="120" cy="100" r="180" fill="#1E5BA8" opacity="0.06"/>
  <circle cx="800" cy="600" r="220" fill="#0FB4A6" opacity="0.08"/>

  <!-- ============== Main Scorecard Card (back-left) ============== -->
  <g filter="url(#v4shadow)">
    <rect x="60" y="80" width="500" height="380" rx="20" fill="#FFFFFF" stroke="#D6E1EE"/>
  </g>

  <!-- Card header -->
  <g>
    <text x="90" y="118" font-family="Inter, sans-serif" font-size="11" font-weight="800" fill="#1E5BA8" letter-spacing="2">AI READINESS SCORECARD</text>
    <text x="90" y="148" font-family="Georgia, serif" font-size="22" font-weight="700" fill="#0A1F3A">Governance snapshot</text>
    <rect x="430" y="100" width="100" height="28" rx="14" fill="#E8F6F4"/>
    <circle cx="447" cy="114" r="4" fill="#0FB4A6"/>
    <text x="458" y="118" font-family="Inter, sans-serif" font-size="11" font-weight="800" fill="#0A7A6F">Live</text>
  </g>

  <!-- Score circle / radial -->
  <g transform="translate(90, 180)">
    <circle cx="55" cy="55" r="48" fill="none" stroke="#E5ECF4" stroke-width="10"/>
    <circle cx="55" cy="55" r="48" fill="none" stroke="url(#v4teal)" stroke-width="10" stroke-linecap="round"
            stroke-dasharray="180 301" transform="rotate(-90 55 55)"/>
    <text x="55" y="52" text-anchor="middle" font-family="Georgia, serif" font-size="28" font-weight="700" fill="#0A1F3A">68</text>
    <text x="55" y="72" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#5B7088" letter-spacing="1">READY</text>
  </g>

  <!-- Score bars -->
  <g transform="translate(220, 180)">
    <g>
      <text x="0" y="14" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#0A1F3A">Policies &amp; staff rules</text>
      <text x="320" y="14" text-anchor="end" font-family="Inter, sans-serif" font-size="12" font-weight="800" fill="#1E5BA8">82%</text>
      <rect x="0" y="22" width="320" height="8" rx="4" fill="#EDF2F8"/>
      <rect x="0" y="22" width="262" height="8" rx="4" fill="url(#v4blueBar)"/>
    </g>
    <g transform="translate(0, 50)">
      <text x="0" y="14" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#0A1F3A">Vendor review</text>
      <text x="320" y="14" text-anchor="end" font-family="Inter, sans-serif" font-size="12" font-weight="800" fill="#1E5BA8">54%</text>
      <rect x="0" y="22" width="320" height="8" rx="4" fill="#EDF2F8"/>
      <rect x="0" y="22" width="173" height="8" rx="4" fill="url(#v4blueBar)"/>
    </g>
    <g transform="translate(0, 100)">
      <text x="0" y="14" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#0A1F3A">Risk &amp; impact records</text>
      <text x="320" y="14" text-anchor="end" font-family="Inter, sans-serif" font-size="12" font-weight="800" fill="#1E5BA8">41%</text>
      <rect x="0" y="22" width="320" height="8" rx="4" fill="#EDF2F8"/>
      <rect x="0" y="22" width="131" height="8" rx="4" fill="#E89B3E"/>
    </g>
    <g transform="translate(0, 150)">
      <text x="0" y="14" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#0A1F3A">Incident response</text>
      <text x="320" y="14" text-anchor="end" font-family="Inter, sans-serif" font-size="12" font-weight="800" fill="#1E5BA8">26%</text>
      <rect x="0" y="22" width="320" height="8" rx="4" fill="#EDF2F8"/>
      <rect x="0" y="22" width="83" height="8" rx="4" fill="#D85A4F"/>
    </g>
  </g>

  <!-- Footer chips -->
  <g transform="translate(90, 410)">
    <rect x="0" y="0" width="130" height="32" rx="16" fill="#EEF4FB" stroke="#D6E1EE"/>
    <text x="65" y="20" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="800" fill="#1E5BA8">EU AI Act · tracked</text>
    <rect x="140" y="0" width="120" height="32" rx="16" fill="#EEF4FB" stroke="#D6E1EE"/>
    <text x="200" y="20" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="800" fill="#1E5BA8">Colorado AI Act</text>
    <rect x="270" y="0" width="100" height="32" rx="16" fill="#EEF4FB" stroke="#D6E1EE"/>
    <text x="320" y="20" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="800" fill="#1E5BA8">NIST AI RMF</text>
  </g>

  <!-- ============== Kit document card (front-right) ============== -->
  <g filter="url(#v4shadow)">
    <rect x="500" y="280" width="340" height="320" rx="20" fill="url(#v4navy)"/>
  </g>

  <g transform="translate(520, 308)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="10" font-weight="800" fill="#9BE5DD" letter-spacing="2">FLAGSHIP KIT</text>
    <text x="0" y="28" font-family="Georgia, serif" font-size="20" font-weight="700" fill="#FFFFFF">AI Governance</text>
    <text x="0" y="52" font-family="Georgia, serif" font-size="20" font-weight="700" fill="#FFFFFF">Starter Stack</text>

    <!-- File list -->
    <g transform="translate(0, 80)">
      <g>
        <rect x="0" y="0" width="300" height="36" rx="8" fill="#FFFFFF" opacity="0.08"/>
        <rect x="10" y="10" width="16" height="16" rx="3" fill="#0FB4A6"/>
        <text x="36" y="22" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">Acceptable Use Policy</text>
        <text x="290" y="22" text-anchor="end" font-family="Inter, sans-serif" font-size="10" font-weight="800" fill="#9BE5DD">.docx</text>
      </g>
      <g transform="translate(0, 44)">
        <rect x="0" y="0" width="300" height="36" rx="8" fill="#FFFFFF" opacity="0.08"/>
        <rect x="10" y="10" width="16" height="16" rx="3" fill="#0FB4A6"/>
        <text x="36" y="22" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">AI System Inventory</text>
        <text x="290" y="22" text-anchor="end" font-family="Inter, sans-serif" font-size="10" font-weight="800" fill="#9BE5DD">.xlsx</text>
      </g>
      <g transform="translate(0, 88)">
        <rect x="0" y="0" width="300" height="36" rx="8" fill="#FFFFFF" opacity="0.08"/>
        <rect x="10" y="10" width="16" height="16" rx="3" fill="#0FB4A6"/>
        <text x="36" y="22" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">Risk Intake Worksheet</text>
        <text x="290" y="22" text-anchor="end" font-family="Inter, sans-serif" font-size="10" font-weight="800" fill="#9BE5DD">.pdf</text>
      </g>
      <g transform="translate(0, 132)">
        <rect x="0" y="0" width="300" height="36" rx="8" fill="#FFFFFF" opacity="0.08"/>
        <rect x="10" y="10" width="16" height="16" rx="3" fill="#0FB4A6"/>
        <text x="36" y="22" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">Vendor Review Checklist</text>
        <text x="290" y="22" text-anchor="end" font-family="Inter, sans-serif" font-size="10" font-weight="800" fill="#9BE5DD">.pdf</text>
      </g>
      <g transform="translate(0, 176)">
        <rect x="0" y="0" width="300" height="36" rx="8" fill="#FFFFFF" opacity="0.08"/>
        <rect x="10" y="10" width="16" height="16" rx="3" fill="#E89B3E"/>
        <text x="36" y="22" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">Update Tracker</text>
        <text x="290" y="22" text-anchor="end" font-family="Inter, sans-serif" font-size="10" font-weight="800" fill="#FFD89E">draft</text>
      </g>
    </g>
  </g>

  <!-- ============== Regulation timeline pill (bottom-left) ============== -->
  <g filter="url(#v4shadow)">
    <rect x="60" y="490" width="400" height="120" rx="18" fill="#FFFFFF" stroke="#D6E1EE"/>
  </g>
  <g transform="translate(80, 514)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="10" font-weight="800" fill="#1E5BA8" letter-spacing="2">REGULATION TRACKER</text>
    <text x="0" y="22" font-family="Georgia, serif" font-size="16" font-weight="700" fill="#0A1F3A">Next 12 months</text>

    <!-- Timeline -->
    <g transform="translate(0, 48)">
      <line x1="0" y1="10" x2="360" y2="10" stroke="#E5ECF4" stroke-width="2"/>
      <g>
        <circle cx="20" cy="10" r="7" fill="#0FB4A6"/>
        <text x="20" y="36" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" font-weight="800" fill="#5B7088">EU GPAI</text>
      </g>
      <g>
        <circle cx="120" cy="10" r="7" fill="#1E5BA8"/>
        <text x="120" y="36" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" font-weight="800" fill="#5B7088">CO ADMT</text>
      </g>
      <g>
        <circle cx="220" cy="10" r="7" fill="#1E5BA8"/>
        <text x="220" y="36" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" font-weight="800" fill="#5B7088">TX TRAIGA</text>
      </g>
      <g>
        <circle cx="320" cy="10" r="7" fill="#E89B3E"/>
        <text x="320" y="36" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" font-weight="800" fill="#5B7088">Sector rules</text>
      </g>
    </g>
  </g>
</svg>
